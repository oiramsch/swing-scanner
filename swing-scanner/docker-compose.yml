services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL to use the persistent data volume
      DATABASE_URL: sqlite:////app/data/swing_scanner.db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data        # SQLite DB — persists across restarts
      - charts:/tmp/charts      # Chart PNGs — shared named volume
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/swing_scanner.db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data
      - charts:/tmp/charts
    command: python -m arq backend.scheduler.WorkerSettings
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8888:80"               # http://NAS-IP:8888/
    depends_on:
      backend:
        condition: service_healthy

volumes:
  charts:
