name: 🤖 Copilot Auto-Fix & Circuit Breaker

on:
  pull_request_review:
    types: [submitted]

jobs:
  copilot-to-claude:
    # Feuert NUR, wenn der Reviewer "Changes requested" wählt
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      
    steps:
      - name: 🛑 Circuit Breaker Logik
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Aktuelle Labels auslesen
          LABELS=$(gh pr view $PR_NUMBER --json labels -q '.labels[].name')

          if echo "$LABELS" | grep -q 'copilot-fix-failed'; then
            echo "Circuit Breaker blockiert Endlosschleife."
            # Der @-Mention hier ist der E-Mail-Trigger! (Dein GitHub-Username)
            gh pr comment $PR_NUMBER --body "@oiramsch 🚨 **Circuit Breaker ausgelöst!** Copilot hat Claudes Fix erneut abgelehnt. Auto-Fix wurde gestoppt, um API-Kosten zu sparen. Bitte manuell prüfen."
            exit 0
            
          elif echo "$LABELS" | grep -q 'copilot-fix-1'; then
            echo "Zweiter Versuch."
            gh pr edit $PR_NUMBER --add-label 'copilot-fix-failed' --remove-label 'copilot-fix-1'
            gh pr comment $PR_NUMBER --body "@claude ⚠️ **LETZTER VERSUCH!** Copilot hat deinen Fix abgelehnt. Lies das neueste Feedback per \`gh pr view $PR_NUMBER --comments\`, behebe die Fehler und pushe."
            exit 0
            
          else
            echo "Erster Versuch."
            gh pr edit $PR_NUMBER --add-label 'copilot-fix-1'
            gh pr comment $PR_NUMBER --body "@claude 🛠️ **Copilot hat Architektur-Fehler gefunden!** Bitte lies dir das Feedback durch (\`gh pr view $PR_NUMBER --comments\`), korrigiere den Code und pushe erneut."
            exit 0
          fi
