name: Claude Code Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, '@claude') && 
       (github.event.comment.author_association == 'OWNER' || github.event.comment.user.login == 'github-actions[bot]')) ||
      (github.event_name == 'pull_request_review_comment' && 
       contains(github.event.comment.body, '@claude') && 
       (github.event.comment.author_association == 'OWNER' || github.event.comment.user.login == 'github-actions[bot]')) ||
      (github.event_name == 'pull_request_review' && 
       contains(github.event.review.body, '@claude') && 
       (github.event.review.author_association == 'OWNER' || github.event.review.user.login == 'github-actions[bot]')) ||
      (github.event_name == 'issues' && 
       (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && 
       github.event.issue.user.login == github.repository_owner)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write  # <--- Diese Zeile fehlt bei dir!

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
